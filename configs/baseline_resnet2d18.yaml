experiment_name: "baseline_resnet2d18"
description: "Standard 2D ResNet-18 (slice-level) baseline — comparison to 3D + context DCA-Net"

model:
  type: "resnet2d18"
  input_size: 64
  num_classes: 1

training:
  num_epochs: 150
  early_stopping_patience: 40
  batch_size: 64
  learning_rate: 0.0003
  weight_decay: 0.00001
  warmup_epochs: 5

  optimizer: "AdamW"
  scheduler: "CosineAnnealingWarmRestarts"
  scheduler_T0: 20
  scheduler_Tmult: 2

  use_amp: true
  gradient_clip: 1.0
  gradient_accumulation_steps: 1

  # Single GPU
  use_data_parallel: false
  device_ids: [0]

  # No curriculum for baseline (train on all samples from epoch 1)
  curriculum:
    enabled: false

  # Baseline uses standard BCE + Focal loss (no uncertainty term)
  loss_weights:
    bce: 0.5
    focal: 0.5
    uncertainty: 0.0

  focal_gamma: 2.5
  focal_alpha: 0.995
  label_smoothing: 0.05

data:
  data_dir: "data"
  preprocessed_dir: "preprocessed_data"
  metadata_dir: "preprocessed_data/metadata"
  train_csv: "train_samples.csv"
  val_csv: "val_samples.csv"
  test_csv: "test_samples.csv"
  num_workers: 6
  pin_memory: true
  prefetch_factor: 4
  persistent_workers: true
  positive_negative_ratio: 15
  train_subsets: [0, 1, 2]
  val_subsets: [3]
  test_subsets: [4]
  augmentation:
    enabled: true
    rotation: true
    rotation_range: 15
    flip: true
    flip_prob: 0.5
    noise: true
    noise_prob: 0.3
    noise_std: 0.05
    intensity_shift: 0.1
    contrast_range: [0.9, 1.1]
    elastic_prob: 0.2
    elastic_alpha: 100
    elastic_sigma: 10

validation:
  validate_every: 1
  primary_metric: "auc_roc"
  optimize_threshold: true
  target_sensitivity: 0.90

evaluation:
  compute_froc: true
  froc_fp_rates: [0.5, 1, 2, 4, 8]
  compute_calibration: true
  calibration_bins: 15
  compute_uncertainty: false
  mc_dropout_passes: 5
  save_plots: true
  plot_formats: ["png", "pdf"]

logging:
  use_wandb: false
  use_tensorboard: true
  log_interval: 10
  save_interval: 5
  keep_last_n: 3
  save_best: true
  checkpoint_dir: "experiments/baseline_resnet2d18/checkpoints"
  log_dir: "experiments/baseline_resnet2d18/logs"

paths:
  data_root: "data"
  output_root: "results"
  model_save_dir: "experiments/baseline_resnet2d18/checkpoints"
  log_dir: "experiments/baseline_resnet2d18/logs"
  figures_dir: "results/figures"

# Single GPU — controlled via CUDA_VISIBLE_DEVICES=1 at launch
gpu:
  use_multi_gpu: false
  device_ids: [0]
  strategy: "none"
  empty_cache_every: 10

experiment_name: "full_model_luna16"
description: "DCA-Net on LUNA16 with optimized hyperparameters"

# ============================================================
# MODEL ARCHITECTURE
# ============================================================
model:
  type: "dca_net"
  ablation: null
  name: "OncoVisionX"

  # Patch sizes (must match preprocessing)
  nodule_patch_size: 64
  context_patch_size: 48

  # Feature dimensions (research-optimized)
  nodule_feature_dim: 512    # EfficientNet-B0 output
  context_feature_dim: 256   # 3D CNN output
  fusion_dim: 256            # Fusion hidden dimension

  # Backbone
  backbone: "efficientnet_b0"  # Pretrained on ImageNet
  pretrained: true
  num_classes: 1

  # Attention
  num_attention_heads: 4     # Multi-head attention for slices
  slice_neighbors: 2

  # Regularization
  dropout: 0.5               # High dropout for small dataset
  prediction_dropout: 0.3

  # Uncertainty (MC Dropout)
  mc_dropout_passes: 10
  enable_uncertainty: true

# ============================================================
# TRAINING HYPERPARAMETERS (RESEARCH-BACKED)
# ============================================================
training:
  # Duration
  num_epochs: 150            # LUNA16 typically needs 100-150 epochs
  early_stopping_patience: 40  # More patience for small dataset

  # Optimization
  optimizer: "AdamW"
  learning_rate: 0.0003      # 3e-4 works well for medical imaging
  weight_decay: 0.00001      # L2 regularization

  # Learning rate schedule
  scheduler: "CosineAnnealingWarmRestarts"
  scheduler_T0: 20           # First restart at 20 epochs
  scheduler_Tmult: 2         # Double interval each time
  warmup_epochs: 5           # Linear warmup for stability

  # Batch size (optimized for 2x RTX 6000)
  batch_size: 64             # 32 per GPU with DataParallel
  gradient_accumulation_steps: 1
  gradient_clip: 1.0         # Prevent gradient explosion

  # Mixed precision (faster on RTX 6000)
  use_amp: true              # Automatic Mixed Precision

  # Multi-GPU
  use_data_parallel: true
  device_ids: [0, 1]

  # Curriculum learning (CRITICAL for LUNA16)
  curriculum:
    stage1_epochs: 50        # Easy samples (hard negatives only)
    stage2_epochs: 50        # Medium (hard + some easy negatives)
    stage3_epochs: 50        # All samples

  # Loss function weights
  loss_weights:
    bce: 0.3                 # Binary Cross-Entropy
    focal: 0.5               # Focal Loss (main loss for imbalance)
    uncertainty: 0.2         # Uncertainty regularization

  # Focal loss parameters (CRITICAL for 1:1400 imbalance)
  focal_gamma: 2.5           # Higher gamma for extreme imbalance
  focal_alpha: 0.995         # Alpha = 1 - (1 / (1 + ratio))
  label_smoothing: 0.05      # Small smoothing for regularization

# ============================================================
# DATA CONFIGURATION
# ============================================================
data:
  # Paths
  data_dir: "data"
  preprocessed_dir: "preprocessed_data"
  metadata_dir: "preprocessed_data/metadata"

  # Splits
  train_csv: "train_samples.csv"
  val_csv: "val_samples.csv"
  test_csv: "test_samples.csv"

  # Data loading (optimized for dual GPU)
  num_workers: 12            # 6 workers per GPU
  pin_memory: true
  prefetch_factor: 4         # Prefetch 4 batches
  persistent_workers: true
  positive_negative_ratio: 15

  # Subset assignment
  train_subsets: [0, 1, 2]
  val_subsets: [3]
  test_subsets: [4]

  # Augmentation (CRITICAL for small dataset)
  augmentation:
    enabled: true

    # Geometric augmentations
    rotation: true
    rotation_range: 15       # +/-15 degrees
    flip: true
    flip_prob: 0.5           # 50% chance to flip

    # Intensity augmentations
    noise: true
    noise_prob: 0.3          # 30% chance to add noise
    noise_std: 0.05          # Small noise
    intensity_shift: 0.1     # +/-10% intensity shift
    contrast_range: [0.9, 1.1]  # +/-10% contrast

    # Elastic deformation
    elastic_prob: 0.2        # 20% chance
    elastic_alpha: 100
    elastic_sigma: 10

# ============================================================
# VALIDATION & EVALUATION
# ============================================================
validation:
  validate_every: 1          # Validate every epoch
  primary_metric: "auc_roc"  # Use AUC for early stopping
  optimize_threshold: true
  target_sensitivity: 0.90   # Target 90% sensitivity

evaluation:
  compute_froc: true
  froc_fp_rates: [0.5, 1, 2, 4, 8]
  compute_calibration: true
  calibration_bins: 15
  compute_uncertainty: true
  mc_dropout_passes: 10
  save_plots: true
  plot_formats: ["png", "pdf"]

# ============================================================
# LOGGING & CHECKPOINTING
# ============================================================
logging:
  # Directories
  experiment_dir: "experiments/full_model"
  checkpoint_dir: "experiments/full_model/checkpoints"
  log_dir: "experiments/full_model/logs"
  tensorboard_dir: "experiments/full_model/tensorboard"

  # Checkpoint saving
  save_interval: 5           # Save checkpoint every 5 epochs
  keep_last_n: 3             # Keep last 3 checkpoints
  save_best: true            # Save best based on val AUC

  # Logging frequency
  log_interval: 10           # Log every 10 batches

  # Visualization
  use_tensorboard: true
  use_wandb: false

paths:
  data_root: "data"
  output_root: "results"
  model_save_dir: "experiments/full_model/checkpoints"
  log_dir: "experiments/full_model/logs"
  figures_dir: "results/figures"

# ============================================================
# MULTI-GPU CONFIGURATION
# ============================================================
gpu:
  use_multi_gpu: true
  device_ids: [0, 1]         # Use both RTX 6000 GPUs
  strategy: "DataParallel"
  empty_cache_every: 10      # Clear cache every 10 batches
